<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 頁面不存在</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 2rem;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        .error-code {
            font-size: 8rem;
            font-weight: bold;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .error-title {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .error-message {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
            line-height: 1.6;
        }

        .actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 3rem;
        }

        .btn {
            color: white;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.2);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 500;
            border: 2px solid rgba(255, 255, 255, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: rgba(76, 175, 80, 0.8);
            border-color: rgba(76, 175, 80, 1);
        }

        .btn-primary:hover {
            background: rgba(76, 175, 80, 1);
        }

        .suggestions {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 2rem;
            margin-top: 2rem;
            backdrop-filter: blur(10px);
        }

        .suggestions h3 {
            font-size: 1.3rem;
            margin-bottom: 1rem;
            color: #fff;
        }

        .suggestion-list {
            list-style: none;
            text-align: left;
        }

        .suggestion-list li {
            margin-bottom: 0.5rem;
            padding-left: 1.5rem;
            position: relative;
        }

        .suggestion-list li::before {
            content: "💡";
            position: absolute;
            left: 0;
        }

        .footer-info {
            margin-top: 3rem;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            .error-code {
                font-size: 5rem;
            }

            .error-title {
                font-size: 2rem;
            }

            .actions {
                flex-direction: column;
                align-items: center;
            }

            .btn {
                width: 200px;
                justify-content: center;
            }
        }

        .floating-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .floating-element {
            position: absolute;
            opacity: 0.1;
            animation: float 6s ease-in-out infinite;
        }

        .floating-element:nth-child(1) {
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .floating-element:nth-child(2) {
            top: 20%;
            right: 10%;
            animation-delay: 2s;
        }

        .floating-element:nth-child(3) {
            bottom: 20%;
            left: 20%;
            animation-delay: 4s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(180deg);
            }
        }
    </style>
</head>

<body>
    <div class="floating-elements">
        <div class="floating-element">🏛️</div>
        <div class="floating-element">📚</div>
        <div class="floating-element">🔍</div>
    </div>

    <div class="container">
        <div class="error-code">404</div>
        <h1 class="error-title">🔍 頁面不存在</h1>
        <p class="error-message">
            抱歉，您訪問的頁面不存在或已被移動。<br>
            請檢查網址是否正確，或使用下方的連結返回。
        </p>

        <div class="actions">
            <a href="/" class="btn btn-primary">
                🏠 返回服務入口
            </a>
            <a href="javascript:history.back()" class="btn">
                ← 返回上一頁
            </a>
            <a href="http://127.0.0.1:3001" target="_blank" class="btn">
                📚 查看文檔
            </a>
        </div>

        <div class="suggestions">
            <h3>可能的解決方案：</h3>
            <ul class="suggestion-list">
                <li>檢查網址拼寫是否正確</li>
                <li>確認所需的服務是否已啟動</li>
                <li>嘗試重新整理頁面</li>
                <li>返回主頁重新導航</li>
                <li>查看系統文檔獲取幫助</li>
            </ul>
        </div>

        <div class="footer-info">
            <p>系統服務入口</p>
            <p>如果問題持續存在，請聯繫系統管理員</p>
        </div>
    </div>

    <script>
        // 記錄 404 錯誤（可選）
        console.log('404 Error:', {
            url: window.location.href,
            referrer: document.referrer,
            timestamp: new Date().toISOString()
        });

        // 自動檢測是否從內部頁面跳轉而來
        if (document.referrer && document.referrer.includes(window.location.host)) {
            console.log('Internal 404 detected from:', document.referrer);
        }

        // 添加鍵盤快捷鍵
        document.addEventListener('keydown', function (e) {
            // 按 H 鍵返回首頁
            if (e.key === 'h' || e.key === 'H') {
                window.location.href = '/';
            }
            // 按 B 鍵返回上一頁
            if (e.key === 'b' || e.key === 'B') {
                history.back();
            }
        });

        // 顯示鍵盤提示（3秒後消失）
        setTimeout(() => {
            const hint = document.createElement('div');
            hint.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: rgba(0,0,0,0.7);
                color: white;
                padding: 0.5rem 1rem;
                border-radius: 4px;
                font-size: 0.8rem;
                z-index: 1000;
                opacity: 0;
                transition: opacity 0.3s ease;
            `;
            hint.textContent = '提示: 按 H 返回首頁，按 B 返回上一頁';
            document.body.appendChild(hint);

            // 淡入效果
            setTimeout(() => hint.style.opacity = '1', 100);

            // 5秒後淡出並移除
            setTimeout(() => {
                hint.style.opacity = '0';
                setTimeout(() => document.body.removeChild(hint), 300);
            }, 5000);
        }, 3000);
    </script>
</body>

</html>
