<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專案文檔</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <div id="app">
        <div class="container">
            <h1>📚 專案文檔</h1>
            
            <div class="search-box">
                <input 
                    v-model="searchQuery" 
                    type="text" 
                    placeholder="🔍 搜尋標題、概述..." 
                    class="search-input"
                />
                <span class="search-stats">{{ filteredBooks.length }} / {{ books.length }} 個文檔</span>
            </div>

            <div class="file-list">
                <div v-for="book in filteredBooks" :key="book.id" class="file-item">
                    <a :href="book.path">{{ book.title }}</a>
                    <div class="file-name">{{ book.filename }}</div>
                    <div class="file-date">📅 {{ book.formattedDate }}</div>
                    <div class="file-description" v-html="highlightText(book.overview)"></div>
                </div>
                <div v-if="filteredBooks.length === 0" class="no-results">
                    找不到符合「{{ searchQuery }}」的文檔
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    books: [],
                    searchQuery: ''
                };
            },
            computed: {
                filteredBooks() {
                    if (!this.searchQuery.trim()) return this.books;
                    
                    const query = this.searchQuery.toLowerCase();
                    return this.books.filter(book => 
                        book.title.toLowerCase().includes(query) ||
                        book.overview.toLowerCase().includes(query) ||
                        book.filename.toLowerCase().includes(query)
                    );
                }
            },
            methods: {
                highlightText(text) {
                    if (!this.searchQuery.trim()) return text;
                    
                    const query = this.searchQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    const regex = new RegExp(`(${query})`, 'gi');
                    return text.replace(regex, '<mark>$1</mark>');
                },
                async loadBooks() {
                    try {
                        const response = await fetch('/static/books.json');
                        const data = await response.json();
                        this.books = data.books;
                    } catch (error) {
                        console.error('載入文檔失敗:', error);
                    }
                }
            },
            mounted() {
                this.loadBooks();
            }
        }).mount('#app');
    </script>
</body>
</html>
