<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>書本閱讀模式 - 專案文檔</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            touch-action: pan-y;
        }
        .book-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            overflow-x: hidden;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
        }
        .page {
            min-width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            overflow-y: auto;
            padding: 2rem;
            box-sizing: border-box;
        }
        .page-header {
            position: sticky;
            top: 0;
            background: white;
            padding: 1rem 0;
            border-bottom: 2px solid #e0e0e0;
            margin-bottom: 1rem;
            z-index: 10;
        }
        .page-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 0;
        }
        .page-number {
            color: #666;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }
        .nav-controls {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 1rem;
            background: rgba(0, 0, 0, 0.8);
            padding: 1rem;
            border-radius: 2rem;
            z-index: 100;
        }
        .nav-btn {
            background: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 1rem;
            cursor: pointer;
            font-size: 1rem;
        }
        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <div id="loading" class="loading">載入中...</div>
    <div id="bookContainer" class="book-container" style="display: none;"></div>
    
    <div class="nav-controls">
        <button id="prevBtn" class="nav-btn">← 上一頁</button>
        <span id="pageInfo" style="color: white; line-height: 2rem;"></span>
        <button id="nextBtn" class="nav-btn">下一頁 →</button>
        <a href="/" class="nav-btn" style="text-decoration: none; line-height: 2rem;">返回首頁</a>
    </div>

    <script>
        let currentPage = 0;
        let totalPages = 0;
        let startX = 0;
        let isDragging = false;

        async function loadBooks() {
            try {
                const response = await fetch('/api/books/all');
                const data = await response.json();
                
                if (!data.success) {
                    throw new Error(data.message);
                }

                totalPages = data.total;
                const container = document.getElementById('bookContainer');
                
                data.pages.forEach((page, index) => {
                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'page';
                    pageDiv.innerHTML = `
                        <div class="page-header">
                            <h1 class="page-title">${page.title}</h1>
                            <div class="page-number">${index + 1} / ${totalPages} - ${page.filename}</div>
                        </div>
                        <div class="markdown-body">${page.htmlContent}</div>
                    `;
                    container.appendChild(pageDiv);
                });

                document.getElementById('loading').style.display = 'none';
                container.style.display = 'flex';
                updateNavigation();
                setupEventListeners();
            } catch (error) {
                console.error('載入失敗:', error);
                document.getElementById('loading').textContent = '載入失敗: ' + error.message;
            }
        }

        function updateNavigation() {
            document.getElementById('pageInfo').textContent = `${currentPage + 1} / ${totalPages}`;
            document.getElementById('prevBtn').disabled = currentPage === 0;
            document.getElementById('nextBtn').disabled = currentPage === totalPages - 1;
        }

        function goToPage(pageIndex) {
            if (pageIndex < 0 || pageIndex >= totalPages) return;
            currentPage = pageIndex;
            const container = document.getElementById('bookContainer');
            container.scrollTo({
                left: currentPage * window.innerWidth,
                behavior: 'smooth'
            });
            updateNavigation();
        }

        function setupEventListeners() {
            const container = document.getElementById('bookContainer');
            
            // 按鈕導航
            document.getElementById('prevBtn').addEventListener('click', () => goToPage(currentPage - 1));
            document.getElementById('nextBtn').addEventListener('click', () => goToPage(currentPage + 1));
            
            // 鍵盤導航
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') goToPage(currentPage - 1);
                if (e.key === 'ArrowRight') goToPage(currentPage + 1);
            });

            // 觸控滑動
            container.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                isDragging = true;
            });

            container.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
                e.preventDefault();
            }, { passive: false });

            container.addEventListener('touchend', (e) => {
                if (!isDragging) return;
                const endX = e.changedTouches[0].clientX;
                const diff = startX - endX;
                
                if (Math.abs(diff) > 50) {
                    if (diff > 0) {
                        goToPage(currentPage + 1);
                    } else {
                        goToPage(currentPage - 1);
                    }
                }
                isDragging = false;
            });

            // 滾動同步
            container.addEventListener('scroll', () => {
                const newPage = Math.round(container.scrollLeft / window.innerWidth);
                if (newPage !== currentPage) {
                    currentPage = newPage;
                    updateNavigation();
                }
            });
        }

        loadBooks();
    </script>
</body>
</html>
